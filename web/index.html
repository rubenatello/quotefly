<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>QuoteFly — SMS-to-Quote for Contractors</title>
    <meta name="description" content="QuoteFly turns contractor job details from SMS into professional quotes in seconds. Built for HVAC, plumbing, flooring, roofing &amp; more. 14-day free trial." />
    <meta name="keywords" content="contractor quoting software, HVAC quote, plumbing estimate, roofing quote, contractor app, SMS to quote" />
    <link rel="canonical" href="https://quotefly.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://quotefly.app/" />
    <meta property="og:title" content="QuoteFly — SMS-to-Quote for Contractors" />
    <meta property="og:description" content="Send a text, get a branded quote. QuoteFly turns job details into professional estimates in seconds." />
    <meta property="og:image" content="https://quotefly.app/og-image.png" />
    <meta property="og:site_name" content="QuoteFly" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QuoteFly — SMS-to-Quote for Contractors" />
    <meta name="twitter:description" content="Turn job texts into professional quotes in seconds. 14-day free trial." />
    <meta name="twitter:image" content="https://quotefly.app/og-image.png" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "QuoteFly",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "QuoteFly turns contractor job details from SMS into professional branded quotes in seconds.",
      "url": "https://quotefly.app",
      "offers": {
        "@type": "Offer",
        "price": "49",
        "priceCurrency": "USD",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "billingDuration": "P1M"
        }
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
