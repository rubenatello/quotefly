<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>QuoteFly - Quoting CRM for Contractors</title>
    <meta
      name="description"
      content="QuoteFly helps contractors add leads, draft quotes fast, and send branded PDFs from one mobile-first CRM."
    />
    <meta
      name="keywords"
      content="contractor quoting software, contractor CRM, HVAC quote, plumbing estimate, roofing quote, chat to quote"
    />
    <link rel="canonical" href="https://quotefly.us/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://quotefly.us/" />
    <meta property="og:title" content="QuoteFly - Quoting CRM for Contractors" />
    <meta
      property="og:description"
      content="Add leads, build quotes fast, and send polished PDFs from one contractor-first CRM."
    />
    <meta property="og:image" content="https://quotefly.us/og-image.png" />
    <meta property="og:site_name" content="QuoteFly" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QuoteFly - Quoting CRM for Contractors" />
    <meta
      name="twitter:description"
      content="Mobile-first quoting CRM for contractors. Build and send professional quotes in minutes."
    />
    <meta name="twitter:image" content="https://quotefly.us/og-image.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "QuoteFly",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "QuoteFly helps contractors manage leads, draft quotes quickly, and send branded PDFs from one mobile-first CRM.",
        "url": "https://quotefly.us",
        "offers": {
          "@type": "Offer",
          "price": "19",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "billingDuration": "P1M"
          }
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
